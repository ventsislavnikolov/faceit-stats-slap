name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # Release tooling only. Pinned to Node 22 because semantic-release's
        # @octokit/plugin-retry crashes on Node 26's stricter undici when a
        # GitHub API call needs a retry ("invalid onRequestStart method").
        # The app, dev, sandbox, and all other CI run on Node 26.3.0.
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install PNPM
        run: npm install -g pnpm@11.5.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable Git Hooks (husky)
        run: git config core.hooksPath /dev/null

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
